services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: infydev
      POSTGRES_PASSWORD: infy.dev
      POSTGRES_DB: linkify
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infydev -d linkify"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    container_name: web
    restart: unless-stopped
    build:
      context: .
      dockerfile: web/dockerfile
    ports:
      - "8080:8080"

volumes:
  pgdata:
