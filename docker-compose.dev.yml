services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: infydev
      POSTGRES_PASSWORD: infy.dev
      POSTGRES_DB: linkify
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infydev -d linkify"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - "back"

  clickhouse:
    container_name: clickhouse
    image: clickhouse/clickhouse-server:25.5-alpine
    restart: unless-stopped
    environment:
      - CLICKHOUSE_USER=infydev
      - CLICKHOUSE_PASSWORD=infy.dev
      - CLICKHOUSE_DB=linkify
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - back
    ulimits:
      nofile: 262144
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--user",
          "infydev",
          "--password",
          "infy.dev",
          "--query",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  back:
    container_name: back
    restart: unless-stopped
    build:
      context: .
      dockerfile: app/Dockerfile
      network: host
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - back
      - web
    env_file:
      - .env

  web:
    container_name: web
    restart: unless-stopped
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "8080:8080"
    networks:
      - "web"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - web
      - back

volumes:
  pgdata:
  clickhouse-data:

networks:
  web:
    driver: bridge
  back:
    driver: bridge
