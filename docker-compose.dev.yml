services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: infydev
      POSTGRES_PASSWORD: infy.dev
      POSTGRES_DB: pastebin
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infydev -d twnotifier"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
